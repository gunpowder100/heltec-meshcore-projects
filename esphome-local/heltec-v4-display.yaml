sensor:
  - platform: adc
    pin: GPIO1
    id: battery_voltage
    name: "Battery Voltage"
    update_interval: 30s
    attenuation: 12db
    filters:
      - multiply: 4.9        # VBAT = 100/(100+390) * VADC → x4.9
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
    on_value:
      - lvgl.label.update:
          id: lbl_battery
          text: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;
            static char buf[16];
            snprintf(buf, sizeof(buf), "BAT %d%%", pct);
            return buf;

