            id: btn_ddf
            align: TOP_LEFT
            x: 4
            y: 38
            width: 112
            height: 68
            bg_color: 0x0D2B0D
            border_color: 0x226622
            border_width: 1
            radius: 8
            on_click:
              - lvgl.label.update:
                  id: lbl_detail_city
                  text: "Dusseldorf"
              - lvgl.label.update:
                  id: lbl_detail_text
                  text: !lambda 'return id(nina_warn_ddf).state.empty() ? "Keine Warnung" : id(nina_warn_ddf).state;'
