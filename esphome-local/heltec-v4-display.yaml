esphome:
  name: heltec-v4-display
  friendly_name: "Heltec V4 Display"
  on_boot:
    priority: 800
    then:
      - switch.turn_on: vext_sw
      - switch.turn_on: adc_ctrl
      - delay: 300ms       # give VEXT rail time to stabilise
      - switch.turn_on: backlight
      - output.turn_off: touch_rst  # assert reset (active LOW)
      - delay: 50ms                  # hold reset long enough for chip to see it
      - output.turn_on: touch_rst   # deassert reset
      - delay: 200ms                 # allow CHSC6X to boot before first poll

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid2
      password: !secret wifi_password2
    - ssid: !secret wifi_ssid3
      password: !secret wifi_password3
  manual_ip:
    static_ip: 192.168.178.93
    gateway: 192.168.178.1
    subnet: 255.255.255.0

switch:
  - platform: gpio
    name: "Vext"
    id: vext_sw
    pin:
      number: GPIO36
      inverted: true
    restore_mode: ALWAYS_ON
    setup_priority: 950   # must be > 900 so VEXT is ON before I2C bus init
    internal: true

  - platform: gpio
    name: "ADC Ctrl"
    id: adc_ctrl
    pin:
      number: GPIO37
      inverted: false
    restore_mode: ALWAYS_ON
    setup_priority: 940
    internal: true

  - platform: gpio
    name: "Backlight"
    id: backlight
    pin:
      number: GPIO21
      inverted: false
    restore_mode: ALWAYS_ON
    setup_priority: 500
    internal: true

output:
  - platform: gpio
    pin: GPIO44
    id: touch_rst

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: true
  frequency: 100kHz

touchscreen:
  - platform: chsc6x
    id: touch_panel
    address: 0x2E
    update_interval: 50ms
    on_touch:
      - logger.log:
          format: "Touch x=%d y=%d"
          args: [touch.x, touch.y]
    on_release:
      - logger.log: "Touch released"

spi:
  clk_pin: GPIO17
  mosi_pin: GPIO33

