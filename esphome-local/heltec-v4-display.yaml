display:
  - platform: ili9xxx
    model: ST7789V
    id: main_display
    cs_pin: GPIO15
    dc_pin: GPIO16
    reset_pin: GPIO18
    invert_colors: true
    rotation: 0
    dimensions:
      height: 320
      width: 240
    auto_clear_enabled: false
    update_interval: never

lvgl:
  displays:
    - main_display
  touchscreens:
    - touch_panel
  color_depth: 16
  bg_color: 0x1a1a2e
  default_font: montserrat_14

  pages:

    # ── PAGE 1: NINA Ruhrpott grid ────────────────────────────
    - id: page_nina
      bg_color: 0x1a1a2e
      widgets:

        - label:
            text: "NINA Ruhrpott"
            align: TOP_MID
            y: 6
            text_color: 0xFF6600
            text_font: montserrat_18

        # Row 1 — Düsseldorf | Duisburg
