################################################################################
# ESPHome – Heltec V4 Expansion Kit
# Halo Sensor Dashboard (Seite 1, Landscape) + NINA Ruhrpott (Seite 2)
# Touch → Sensor-Detailansicht mit Min/Max/Verlauf (Seiten 4-9)
#
# Display: ST7789V 240×320 → rotation 270 → 320×240 Landscape (umgedreht)
# IP: 192.168.178.93 (static)
################################################################################

esphome:
  name: heltec-v4-display
  friendly_name: "Heltec V4 Display"
  on_boot:
    priority: 800
    then:
      - switch.turn_on: vext_sw
      - switch.turn_on: adc_ctrl
      - delay: 300ms
      - switch.turn_on: backlight
      - output.turn_off: touch_rst
      - delay: 50ms
      - output.turn_on: touch_rst
      - delay: 200ms

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid2
      password: !secret wifi_password2
    - ssid: !secret wifi_ssid3
      password: !secret wifi_password3
  manual_ip:
    static_ip: 192.168.178.93
    gateway: 192.168.178.1
    subnet: 255.255.255.0

time:
  - platform: homeassistant
    id: ha_time
    timezone: Europe/Berlin

# ── Hardware ──────────────────────────────────────────────────────────────────
switch:
  - platform: gpio
    name: "Vext"
    id: vext_sw
    pin:
      number: GPIO36
      inverted: true
    restore_mode: ALWAYS_ON
    setup_priority: 950
    internal: true

  - platform: gpio
    name: "ADC Ctrl"
    id: adc_ctrl
    pin:
      number: GPIO37
      inverted: false
    restore_mode: ALWAYS_ON
    setup_priority: 940
    internal: true

  - platform: gpio
    name: "Backlight"
    id: backlight
    pin:
      number: GPIO21
      inverted: false
    restore_mode: ALWAYS_ON
    setup_priority: 500
    internal: true

output:
  - platform: gpio
    pin: GPIO44
    id: touch_rst

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: false
  frequency: 100kHz

touchscreen:
  - platform: chsc6x
    id: touch_panel
    address: 0x2E
    update_interval: 50ms

spi:
  clk_pin: GPIO17
  mosi_pin: GPIO33

# ── Physische Buttons werden unten im binary_sensor Block ergänzt ─────────────

# ── Globals: Min/Max tracking per sensor ─────────────────────────────────────
globals:
  - id: g_temp_min
    type: float
    restore_value: false
    initial_value: '999.0'
  - id: g_temp_max
    type: float
    restore_value: false
    initial_value: '-999.0'

  - id: g_vape_min
    type: float
    restore_value: false
    initial_value: '999.0'
  - id: g_vape_max
    type: float
    restore_value: false
    initial_value: '-999.0'

  - id: g_pres_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_pres_total
    type: int
    restore_value: false
    initial_value: '0'

  - id: g_lux_min
    type: float
    restore_value: false
    initial_value: '99999.0'
  - id: g_lux_max
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: g_hum_min
    type: float
    restore_value: false
    initial_value: '999.0'
  - id: g_hum_max
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: g_noise_min
    type: float
    restore_value: false
    initial_value: '999.0'
  - id: g_noise_max
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: g_vape_blink
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: g_vape_active
    type: bool
    restore_value: false
    initial_value: 'false'

# ── Sensors ───────────────────────────────────────────────────────────────────
sensor:
  - platform: adc
    pin: GPIO1
    id: battery_voltage
    name: "Battery Voltage"
    update_interval: 30s
    attenuation: 12db
    filters:
      - multiply: 4.9
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
    on_value:
      - lvgl.label.update:
          id: lbl_battery
          text: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;
            // Block symbol: ▓▓▓░ style using ASCII chars
            const char* icon = pct > 75 ? "[||||]" : pct > 50 ? "[|||_]" : pct > 25 ? "[||__]" : "[|___]";
            static char buf[20];
            snprintf(buf, sizeof(buf), "%s %d%%", icon, pct);
            return buf;
          text_color: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            return pct > 25 ? lv_color_hex(0x44FF88) : lv_color_hex(0xFF4400);
      - lvgl.label.update:
          id: lbl_sys_bat_pct
          text: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;
            static char buf[8];
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;
          text_color: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            return pct > 25 ? lv_color_hex(0x44FF88) : lv_color_hex(0xFF4400);
      - lvgl.label.update:
          id: lbl_sys_bat_bar
          text: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;
            const char* bar = pct > 75 ? "[||||]" : pct > 50 ? "[|||_]" : pct > 25 ? "[||__]" : "[|___]";
            static char b[10];
            strncpy(b, bar, 9);
            return b;
      - lvgl.label.update:
          id: lbl_sys_bat_icon
          text: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;
            // MDI battery icons: 90=F0082, 80=F0081, 70=F0080, 50=F007E, 20=F007B, empty=F008E
            static char b[5];
            uint32_t cp = pct > 85 ? 0xF0082 : pct > 75 ? 0xF0081 : pct > 65 ? 0xF0080 : pct > 40 ? 0xF007E : pct > 15 ? 0xF007B : 0xF008E;
            b[0] = 0xF0 | (cp >> 18); b[1] = 0x80 | ((cp >> 12) & 0x3F); b[2] = 0x80 | ((cp >> 6) & 0x3F); b[3] = 0x80 | (cp & 0x3F); b[4] = 0;
            return b;
          text_color: !lambda |-
            float v = x;
            int pct = (int)((v - 3.3f) / (4.2f - 3.3f) * 100.0f);
            return pct > 25 ? lv_color_hex(0x44FF88) : lv_color_hex(0xFF4400);

  - platform: homeassistant
    id: weather_temp
    entity_id: weather.forecast_home
    attribute: temperature
    name: "Wetter Temp"
    on_value:
      - lvgl.label.update:
          id: lbl_weather_temp
          text: !lambda |-
            static char b[12];
            snprintf(b, sizeof(b), "%.1f°C", x);
            return b;

  - platform: homeassistant
    id: weather_humidity
    entity_id: weather.forecast_home
    attribute: humidity
    name: "Wetter Humidity"
    on_value:
      - lvgl.label.update:
          id: lbl_weather_hum
          text: !lambda |-
            static char b[10];
            snprintf(b, sizeof(b), "%.0f%%", x);
            return b;

  - platform: homeassistant
    id: halo_temp
    entity_id: input_number.halo_temp
    name: "Halo Temp"
    filters:
      - heartbeat: 10s
    on_value:
      - lambda: |-
          if (x < id(g_temp_min)) id(g_temp_min) = x;
          if (x > id(g_temp_max)) id(g_temp_max) = x;
      - lvgl.label.update:
          id: lbl_temp_val
          text: !lambda |-
            static char buf[10];
            snprintf(buf, sizeof(buf), "%.1f", x);
            return buf;
      - lvgl.label.update:
          id: lbl_temp_big
          text: !lambda |-
            static char buf[12];
            snprintf(buf, sizeof(buf), "%.1f °C", x);
            return buf;
      - lvgl.label.update:
          id: lbl_temp_stat
          text: !lambda |-
            static char buf[32];
            snprintf(buf, sizeof(buf), "Min %.1f  Max %.1f", id(g_temp_min), id(g_temp_max));
            return buf;
      - lvgl.bar.update:
          id: bar_temp
          value: !lambda |-
            // map temp 0-40 → 0-100
            int v = (int)((x / 40.0f) * 100.0f);
            if (v < 0) v = 0;
            if (v > 100) v = 100;
            return v;

  - platform: homeassistant
    id: halo_vape
    entity_id: input_number.halo_vape
    name: "Halo Vape"
    filters:
      - heartbeat: 10s
    on_value:
      - lambda: |-
          if (x < id(g_vape_min)) id(g_vape_min) = x;
          if (x > id(g_vape_max)) id(g_vape_max) = x;
      - lambda: 'id(g_vape_active) = (x > 0.5f);'
      - if:
          condition:
            lambda: 'return x > 0.5f;'
          then:
            - lvgl.label.update:
                id: lbl_vape_val
                text: "\U000F04B4"
                text_font: font_mdi_40
                text_color: 0xFF3300
            - lvgl.widget.update:
                id: btn_vape
                bg_color: 0x5A0000
          else:
            - lvgl.label.update:
                id: lbl_vape_val
                text: "\U000F04B4"
                text_font: font_mdi_40
                text_color: 0x44FF88
            - lvgl.widget.update:
                id: btn_vape
                bg_color: 0x0D2233
      - lvgl.label.update:
          id: lbl_vape_big
          text: !lambda |-
            static char buf[10];
            snprintf(buf, sizeof(buf), "%.0f", x);
            return buf;
      - lvgl.label.update:
          id: lbl_vape_stat
          text: !lambda |-
            static char buf[32];
            snprintf(buf, sizeof(buf), "Min %.0f  Max %.0f", id(g_vape_min), id(g_vape_max));
            return buf;
      - lvgl.bar.update:
          id: bar_vape
          value: !lambda |-
            int v = (int)(x);
            if (v < 0) v = 0;
            if (v > 100) v = 100;
            return v;

  - platform: homeassistant
    id: halo_occupancy
    entity_id: input_number.halo_occupancy
    name: "Halo Occupancy"
    filters:
      - heartbeat: 10s
    on_value:
      - lambda: |-
          id(g_pres_total)++;
          if (x >= 1.0f) id(g_pres_count)++;
      - lvgl.label.update:
          id: lbl_pres_val
          text: !lambda |-
            static char b[10]; strncpy(b, x >= 1.0f ? "ERKANNT" : "FREI", 9); return b;
      - lvgl.label.update:
          id: lbl_pres_big
          text: !lambda |-
            static char b[10]; strncpy(b, x >= 1.0f ? "ERKANNT" : "FREI", 9); return b;
      - lvgl.label.update:
          id: lbl_pres_stat
          text: !lambda |-
            static char buf[40];
            int pct = id(g_pres_total) > 0 ? (id(g_pres_count) * 100 / id(g_pres_total)) : 0;
            snprintf(buf, sizeof(buf), "Anwesend %d%% der Zeit", pct);
            return buf;
      - lvgl.bar.update:
          id: bar_pres
          value: !lambda |-
            return x >= 1.0f ? 100 : 0;

  - platform: homeassistant
    id: halo_light
    entity_id: input_number.halo_light
    name: "Halo Light"
    filters:
      - heartbeat: 10s
    on_value:
      - lambda: |-
          if (x < id(g_lux_min)) id(g_lux_min) = x;
          if (x > id(g_lux_max)) id(g_lux_max) = x;
      - lvgl.label.update:
          id: lbl_lux_val
          text: !lambda |-
            static char buf[10];
            if (x >= 1000.0f)
              snprintf(buf, sizeof(buf), "%.1fk", x/1000.0f);
            else
              snprintf(buf, sizeof(buf), "%.0f", x);
            return buf;
      - lvgl.label.update:
          id: lbl_lux_big
          text: !lambda |-
            static char buf[14];
            if (x >= 1000.0f)
              snprintf(buf, sizeof(buf), "%.1fk lux", x/1000.0f);
            else
              snprintf(buf, sizeof(buf), "%.0f lux", x);
            return buf;
      - lvgl.label.update:
          id: lbl_lux_stat
          text: !lambda |-
            static char buf[32];
            snprintf(buf, sizeof(buf), "Min %.0f  Max %.0f", id(g_lux_min), id(g_lux_max));
            return buf;
      - lvgl.bar.update:
          id: bar_lux
          value: !lambda |-
            int v = (int)((x / 5000.0f) * 100.0f);
            if (v < 0) v = 0;
            if (v > 100) v = 100;
            return v;

  - platform: homeassistant
    id: halo_humidity
    entity_id: input_number.halo_humidity
    name: "Halo Humidity"
    filters:
      - heartbeat: 10s
    on_value:
      - lambda: |-
          if (x < id(g_hum_min)) id(g_hum_min) = x;
          if (x > id(g_hum_max)) id(g_hum_max) = x;
      - lvgl.label.update:
          id: lbl_hum_val
          text: !lambda |-
            static char buf[8];
            snprintf(buf, sizeof(buf), "%.0f", x);
            return buf;
      - lvgl.label.update:
          id: lbl_hum_big
          text: !lambda |-
            static char buf[10];
            snprintf(buf, sizeof(buf), "%.0f %%", x);
            return buf;
      - lvgl.label.update:
          id: lbl_hum_stat
          text: !lambda |-
            static char buf[32];
            snprintf(buf, sizeof(buf), "Min %.0f%%  Max %.0f%%", id(g_hum_min), id(g_hum_max));
            return buf;
      - lvgl.bar.update:
          id: bar_hum
          value: !lambda |-
            int v = (int)x;
            if (v < 0) v = 0;
            if (v > 100) v = 100;
            return v;

  - platform: homeassistant
    id: halo_noise
    entity_id: input_number.halo_noise
    name: "Halo Noise"
    filters:
      - heartbeat: 10s
    on_value:
      - lambda: |-
          if (x < id(g_noise_min)) id(g_noise_min) = x;
          if (x > id(g_noise_max)) id(g_noise_max) = x;
      - lvgl.label.update:
          id: lbl_noise_val
          text: !lambda |-
            static char buf[8];
            snprintf(buf, sizeof(buf), "%.0f", x);
            return buf;
      - lvgl.label.update:
          id: lbl_noise_big
          text: !lambda |-
            static char buf[12];
            snprintf(buf, sizeof(buf), "%.0f dB", x);
            return buf;
      - lvgl.label.update:
          id: lbl_noise_stat
          text: !lambda |-
            static char buf[32];
            snprintf(buf, sizeof(buf), "Min %.0f  Max %.0f", id(g_noise_min), id(g_noise_max));
            return buf;
      - lvgl.bar.update:
          id: bar_noise
          value: !lambda |-
            int v = (int)((x / 120.0f) * 100.0f);
            if (v < 0) v = 0;
            if (v > 100) v = 100;
            return v;

text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: weather.forecast_home
    name: "Wetter"
    on_value:
      - lvgl.label.update:
          id: lbl_weather_state
          text: !lambda |-
            static char b[20];
            strncpy(b, x.c_str(), 19);
            return b;

  - platform: wifi_info
    ip_address:
      name: "WiFi IP"
      id: wifi_ip
      on_value:
        - if:
            condition:
              lambda: 'return x.length() > 3;'
            then:
              - lvgl.label.update:
                  id: lbl_wifi_icon
                  text: "\U000F05A9"
                  text_font: font_mdi_28
                  text_color: 0x44FF88
              - lvgl.label.update:
                  id: lbl_sys_wifi
                  text: "Verbunden"
                  text_color: 0x44FF88
            else:
              - lvgl.label.update:
                  id: lbl_wifi_icon
                  text: "\U000F05A9"
                  text_font: font_mdi_28
                  text_color: 0xFF3300
              - lvgl.label.update:
                  id: lbl_sys_wifi
                  text: "Getrennt"
                  text_color: 0xFF3300
        - lvgl.label.update:
            id: lbl_sys_ip
            text: !lambda |-
              static char b[20];
              strncpy(b, x.c_str(), 19);
              return b;

  - platform: homeassistant
    id: nina_warn_ddf
    entity_id: input_text.nina_warn_ddf

  - platform: homeassistant
    id: nina_warn_dui
    entity_id: input_text.nina_warn_dui

  - platform: homeassistant
    id: nina_warn_ess
    entity_id: input_text.nina_warn_ess

  - platform: homeassistant
    id: nina_warn_mue
    entity_id: input_text.nina_warn_mue

  - platform: homeassistant
    id: nina_warn_obe
    entity_id: input_text.nina_warn_obe

  - platform: homeassistant
    id: nina_warn_met
    entity_id: input_text.nina_warn_met

binary_sensor:
  # ── Physische Buttons ──────────────────────────────────────────────────────
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    name: "Button Oben"
    id: btn_physical_up
    filters:
      - delayed_on: 20ms
    on_click:
      - lvgl.page.next:
          animation: MOVE_LEFT
          time: 200ms

  - platform: gpio
    pin:
      number: GPIO14
      inverted: true
      mode: INPUT_PULLUP
    name: "Button Unten"
    id: btn_physical_down
    filters:
      - delayed_on: 20ms
    on_click:
      - lvgl.page.previous:
          animation: MOVE_RIGHT
          time: 200ms

  # ── NINA ───────────────────────────────────────────────────────────────────
  - platform: homeassistant
    id: nina_ddf
    entity_id: binary_sensor.nina_warning_dusseldorf_stadt_1
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then:
            - lvgl.widget.update:
                id: btn_ddf
                bg_color: 0x8B0000
            - lvgl.label.update:
                id: lbl_ddf
                text: "WARN"
                text_color: 0xFF4444
          else:
            - lvgl.widget.update:
                id: btn_ddf
                bg_color: 0x0D2B0D
            - lvgl.label.update:
                id: lbl_ddf
                text: "OK"
                text_color: 0x44FF88

  - platform: homeassistant
    id: nina_dui
    entity_id: binary_sensor.nina_warning_duisburg_stadt_1
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then:
            - lvgl.widget.update:
                id: btn_dui
                bg_color: 0x8B0000
            - lvgl.label.update:
                id: lbl_dui
                text: "WARN"
                text_color: 0xFF4444
          else:
            - lvgl.widget.update:
                id: btn_dui
                bg_color: 0x0D2B0D
            - lvgl.label.update:
                id: lbl_dui
                text: "OK"
                text_color: 0x44FF88

  - platform: homeassistant
    id: nina_ess
    entity_id: binary_sensor.nina_warning_essen_stadt_1
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then:
            - lvgl.widget.update:
                id: btn_ess
                bg_color: 0x8B0000
            - lvgl.label.update:
                id: lbl_ess
                text: "WARN"
                text_color: 0xFF4444
          else:
            - lvgl.widget.update:
                id: btn_ess
                bg_color: 0x0D2B0D
            - lvgl.label.update:
                id: lbl_ess
                text: "OK"
                text_color: 0x44FF88

  - platform: homeassistant
    id: nina_mue
    entity_id: binary_sensor.nina_warning_mulheim_an_der_ruhr_stadt_1
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then:
            - lvgl.widget.update:
                id: btn_mue
                bg_color: 0x8B0000
            - lvgl.label.update:
                id: lbl_mue
                text: "WARN"
                text_color: 0xFF4444
          else:
            - lvgl.widget.update:
                id: btn_mue
                bg_color: 0x0D2B0D
            - lvgl.label.update:
                id: lbl_mue
                text: "OK"
                text_color: 0x44FF88

  - platform: homeassistant
    id: nina_obe
    entity_id: binary_sensor.nina_warning_oberhausen_stadt_1
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then:
            - lvgl.widget.update:
                id: btn_obe
                bg_color: 0x8B0000
            - lvgl.label.update:
                id: lbl_obe
                text: "WARN"
                text_color: 0xFF4444
          else:
            - lvgl.widget.update:
                id: btn_obe
                bg_color: 0x0D2B0D
            - lvgl.label.update:
                id: lbl_obe
                text: "OK"
                text_color: 0x44FF88

  - platform: homeassistant
    id: nina_met
    entity_id: binary_sensor.nina_warning_mettmann_stadt_mettmann_nordrhein_westfalen_velbert_stadt_mettmann_nordrhein_westfalen_1
    on_state:
      - if:
          condition: {lambda: 'return x;'}
          then:
            - lvgl.widget.update:
                id: btn_met
                bg_color: 0x8B0000
            - lvgl.label.update:
                id: lbl_met
