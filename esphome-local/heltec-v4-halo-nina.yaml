# ── Blink-Intervall für Vape-Alarm ────────────────────────────────────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (t.is_valid()) {
            static char tbuf[6];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d", t.hour, t.minute);
            lv_label_set_text(id(lbl_sys_time), tbuf);
            static char dbuf[12];
            snprintf(dbuf, sizeof(dbuf), "%02d.%02d.%04d", t.day_of_month, t.month, t.year);
            lv_label_set_text(id(lbl_sys_date), dbuf);
          }

  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(g_vape_active);'
          then:
            - lambda: 'id(g_vape_blink) = !id(g_vape_blink);'
            - lvgl.widget.update:
                id: btn_vape
                bg_color: !lambda |-
                  return id(g_vape_blink) ? lv_color_hex(0x8B0000) : lv_color_hex(0xFF2200);
          else:
            - lambda: 'id(g_vape_blink) = false;'
            - lvgl.widget.update:
                id: btn_vape
                bg_color: 0x0D2233

display:
  - platform: ili9xxx
    model: ST7789V
    id: main_display
    cs_pin: GPIO15
    dc_pin: GPIO16
    reset_pin: GPIO18
    invert_colors: true
    rotation: 270
    dimensions:
      height: 320
      width: 240
    auto_clear_enabled: false
    update_interval: never

