                id: lbl_met
                text: "OK"
                text_color: 0x44FF88

# ── Display ───────────────────────────────────────────────────────────────────
# ── MDI Icon Font ─────────────────────────────────────────────────────────────
font:
  - file: "fonts/materialdesignicons.ttf"
    id: font_mdi_40
