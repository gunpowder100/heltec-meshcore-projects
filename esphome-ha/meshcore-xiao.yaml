esphome:
  name: meshcore-xiao
  friendly_name: "MeshCore XIAO"

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  services:
    - service: send_lora
      variables:
        message: string
      then:
        - lambda: |-
            ESP_LOGI("lora", "Sending: %s", message.c_str());
        - sx126x.send_packet:
            id: lora_radio
            data: !lambda |-
              return std::vector<uint8_t>(message.begin(), message.end());

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.178.91
    gateway: 192.168.178.1
    subnet: 255.255.255.0
  ap:
    ssid: "meshcore-xiao-fallback"
    password: "fallbackpass"

captive_portal:

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9
  miso_pin: GPIO8

sx126x:
  id: lora_radio
  hw_version: sx1262
  modulation: LORA
  cs_pin: GPIO41
  rst_pin: GPIO42
  busy_pin: GPIO40
  dio1_pin: GPIO39
  frequency: 868000000
  bandwidth: 125_0kHz
  spreading_factor: 7
  coding_rate: CR_4_5
  pa_power: 14
  rf_switch: true
  tcxo_voltage: 1_8V
  tcxo_delay: 5ms
  rx_start: true
  sync_value: [0x12, 0x34]
  on_packet:
    then:
      - lambda: |-
          std::string msg(x.begin(), x.end());
          ESP_LOGI("lora", "RX: %s (RSSI: %.0f)", msg.c_str(), rssi);
          id(lora_last_message).publish_state(msg);
          id(lora_rssi_val).publish_state(rssi);

text_sensor:
  - platform: template
    name: "LoRa Last Message"
    id: lora_last_message
    icon: "mdi:radio-tower"

sensor:
  - platform: template
    name: "LoRa RSSI"
    id: lora_rssi_val
    unit_of_measurement: "dBm"
    icon: "mdi:signal"
    accuracy_decimals: 0

binary_sensor:
  - platform: status
    name: "XIAO Status"
    id: xiao_connected
