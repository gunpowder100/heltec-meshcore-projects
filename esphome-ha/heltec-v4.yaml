esphome:
  name: heltecv4
  friendly_name: HeltecV4
  on_boot:
    priority: 600
    then:
      - display.page.show: page_main
      - component.update: oled

esp32:
  board: heltec_wifi_lora_32_V3
  framework:
    type: esp-idf
  flash_size: 8MB

logger:

api:
  encryption:
    key: "ip5BKp5qP4XE9uSeUnZD/9HdQPYO6zH+7ZKNHk5jsX0="
  services:
    - service: show_alert
      variables:
        line1: string
        line2: string
        line3: string
      then:
        - globals.set:
            id: alert_line1
            value: !lambda 'return line1;'
        - globals.set:
            id: alert_line2
            value: !lambda 'return line2;'
        - globals.set:
            id: alert_line3
            value: !lambda 'return line3;'
        - globals.set:
            id: alert_active
            value: 'true'
        - display.page.show: page_alert
        - component.update: oled
        - delay: 30s
        - globals.set:
            id: alert_active
            value: 'false'
        - display.page.show: page_main
        - component.update: oled

ota:
  - platform: esphome
    password: "0c83ab32473b80ea13cbb38f91d10055"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.178.92
    gateway: 192.168.178.1
    subnet: 255.255.255.0
  ap:
    ssid: "Heltecv4 Fallback Hotspot"
    password: "it80NLLh8D0k"

captive_portal:

uart:
  rx_pin: GPIO44
  tx_pin: GPIO43
  baud_rate: 9600

gps:
  id: my_gps
  latitude:
    name: "GPS Latitude"
    id: gps_lat
  longitude:
    name: "GPS Longitude"
    id: gps_lon
  altitude:
    name: "GPS Altitude"
    id: gps_alt

globals:
  - id: alert_line1
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: alert_line2
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: alert_line3
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: alert_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: current_page
    type: int
    restore_value: false
    initial_value: '0'

i2c:
  sda: GPIO17
  scl: GPIO18
  scan: true
  frequency: 100000

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto"
    id: font_medium
    size: 13
  - file: "gfonts://Roboto+Mono"
    id: font_mono
    size: 11

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    pages:
      - id: page_main
        lambda: |-
          it.print(0, 0, id(font_medium), "JonS HA");
          if (id(wifi_connected).state) {
            it.print(80, 0, id(font_small), "WiFi OK");
          } else {
            it.print(80, 0, id(font_small), "No WiFi");
          }
          it.line(0, 14, 128, 14);
          if (id(gps_lat).has_state()) {
            it.printf(0, 17, id(font_small), "%.4f,%.4f",
              id(gps_lat).state, id(gps_lon).state);
          } else {
            it.print(0, 17, id(font_small), "GPS: Suche...");
          }
          it.strftime(0, 30, id(font_medium), "%H:%M:%S", id(ha_time).now());
          it.print(0, 46, id(font_small), id(wifi_ip).state.c_str());
          if (id(alert_active)) {
            it.print(90, 46, id(font_small), "!ALERT");
          }

      - id: page_alert
        lambda: |-
          it.filled_rectangle(0, 0, 128, 14);
          it.print(2, 1, id(font_small), TextAlign::TOP_LEFT, "! ALERT");
          it.strftime(70, 1, id(font_small), TextAlign::TOP_LEFT,
            "%H:%M", id(ha_time).now());
          it.line(0, 14, 128, 14);
          it.printf(0, 17, id(font_small), "%s", id(alert_line1).c_str());
          it.printf(0, 30, id(font_small), "%s", id(alert_line2).c_str());
          it.printf(0, 43, id(font_small), "%s", id(alert_line3).c_str());
          it.rectangle(0, 0, 128, 64);

      - id: page_gps
        lambda: |-
          it.print(0, 0, id(font_medium), "GPS Position");
          it.line(0, 14, 128, 14);
          if (id(gps_lat).has_state()) {
            it.printf(0, 17, id(font_small), "Lat: %.6f", id(gps_lat).state);
            it.printf(0, 30, id(font_small), "Lon: %.6f", id(gps_lon).state);
            it.printf(0, 43, id(font_small), "Alt: %.1fm", id(gps_alt).state);
          } else {
            it.print(0, 17, id(font_small), "Kein GPS Signal");
          }

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
      ignore_strapping_warning: true
    name: "Button"
    on_click:
      - lambda: |-
          id(current_page) = (id(current_page) + 1) % 3;
          switch (id(current_page)) {
            case 0: id(oled).show_page(id(page_main)); break;
            case 1: id(oled).show_page(id(page_gps)); break;
            case 2: id(oled).show_page(id(page_alert)); break;
          }
          id(oled).update();
  - platform: status
    name: "Heltec Status"
    id: wifi_connected

time:
  - platform: homeassistant
    id: ha_time

sensor:
  - platform: wifi_signal
    name: "Heltec WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Heltec IP"
      id: wifi_ip